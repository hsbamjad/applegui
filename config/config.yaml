# Apple Sorting GUI - Master Configuration
# Michigan State University | ASABE AIM26 | 2026
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Hardware: JAI FSFE-3200T-10GE camera + 3-lane screw conveyor
#           + 3Г— pneumatic sorting units controlled via Arduino

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# CAMERA
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
camera:
  mode: "jai"           # Options: "mock" | "jai"  - falls back to mock if camera not found


  mock:
    fps: 60             # Match JAI real-capture rate
    resolution: [2048, 1536]   # Match JAI Sony IMX252 native res
    replay_folder: null         # Path to real captured frames, or null for synthetic

  # Video simulation mode - replaces live camera with pre-recorded video files.
  # Set enabled: true and update the three video paths to run without hardware.
  simulation:
    enabled: false
    loop: true          # Loop videos when end is reached
    fps: 30             # Playback frame rate
    videos:
      ch1: "D:/HA/apple_gui/videos/Source0/G5/G5.mp4"
      ch2: "D:/HA/apple_gui/videos/Source1/G5/G5.avi"
      ch3: "D:/HA/apple_gui/videos/Source2/G5/G5.avi"

  jai:
    # Confirmed hardware (Shuttle PC) - from camera_probe_jai.py output
    ip:          "169.254.101.209"   # Update if DHCP changes
    mac:         "00:0c:df:0a:f3:f8"
    serial:      "U320500"
    fps:         30                  # Confirmed: 30.0 FPS stable at full res
    exposure_us: 9229                # Confirmed default (ExposureAuto=Off)
    trigger_mode: "Off"             # Free-run (encoder trigger = future)
    num_channels: 3
    # Sources confirmed:
    #   Source0 (ch_id=0): BayerRG8 2048Г—1536 - Color ~660nm
    #   Source1 (ch_id=1): Mono8    2048Г—1536 - NIR1  ~800nm
    #   Source2 (ch_id=2): Mono8    2048Г—1536 - NIR2  ~900nm


# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# SPECTRAL CHANNELS
# 5-band (RGB + NIR1 + NIR2) from JAI - 3 used for sorting
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
channels:
  ch1:
    name: "RG"
    description: "Red-Green visible band"
    wavelength_nm: 660
    sensor_index: 0     # buffer.payload.components[0]
    color: "#60A5FA"

  ch2:
    name: "NIR1"
    description: "Near-infrared band 1 - bruising / internal structure"
    wavelength_nm: 800
    sensor_index: 1     # buffer.payload.components[1]
    color: "#34D399"

  ch3:
    name: "NIR2"
    description: "Near-infrared band 2 - water content / firmness"
    wavelength_nm: 900
    sensor_index: 2     # buffer.payload.components[2]
    color: "#A78BFA"

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# CONVEYOR
# 3-lane screw conveyor; apples spin as they travel
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
conveyor:
  lanes: 3
  # Orientation: how apples move through camera view
  #   LR = leftв†’right   RL = rightв†’left
  #   TB = topв†’bottom   BT = bottomв†’top  в†ђ current camera setup
  orientation: "LR"   # LR=leftв†’right (test video) | BT=bottomв†’top (real camera)
  speed_apples_per_sec: 2          # Nominal: 1 | 2 | 3 apples/s/lane  в†ђ SET TO MATCH CONVEYOR
  camera_to_gate_m: 0.0            # Arduino handles timing via NIR sensor - fire immediately on grade
  # Timing delay (ms) = (camera_to_gate_m / conveyor_speed_m_s) * 1000
  # Software computes this dynamically - set conveyor_speed_m_s at runtime

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# SORTER HARDWARE
# 3 sorting units - one per lane - at end of conveyor
# Each unit: Submodule A (Freshв†’Outlet A) + Submodule B (Processingв†’Outlet B)
# Default (no signal): apple falls to Outlet C (Cull)
# Control path: PC в†’ USB/Serial в†’ Arduino в†’ Solenoid valve в†’ Air cylinder в†’ Paddle
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
sorter:
  mode: "serial"    # Options: "simulation" | "serial" (Arduino)

  # Grade в†’ outlet mapping (DO NOT CHANGE without physical verification)
  grade_outlet_map:
    Fresh:      "A"     # Submodule A fires в†’ paddle deflects в†’ Outlet A
    Processing: "B"     # Submodule B fires в†’ paddle deflects в†’ Outlet B
    Cull:       "C"     # No signal в†’ apple falls through в†’ Outlet C (default/safe)

  # Serial (Arduino) configuration
  serial:
    port: "COM3"        # Update to actual Arduino COM port on Shuttle PC
    baudrate: 115200    # Confirmed from Arduino sketch (Serial.begin(115200))
    timeout_s: 1.0

  # Arduino command protocol (single byte commands)
  # Arduino sketch must listen and fire the appropriate solenoid
  arduino_commands:
    lane_1_submodule_A: "1A"    # Lane 1 в†’ Fresh
    lane_1_submodule_B: "1B"    # Lane 1 в†’ Processing
    lane_2_submodule_A: "2A"    # Lane 2 в†’ Fresh
    lane_2_submodule_B: "2B"    # Lane 2 в†’ Processing
    lane_3_submodule_A: "3A"    # Lane 3 в†’ Fresh
    lane_3_submodule_B: "3B"    # Lane 3 в†’ Processing
    # Cull (C) requires NO command - apple falls to Outlet C by default

  # NIR switch (arrival sensor at sorter gate - optional)
  nir_switch:
    enabled: false      # Set true if Arduino reports apple-arrival confirmation
    timeout_ms: 200     # If apple not detected within this window, log a miss

  # Pneumatic system safety
  valve_pulse_ms: 80    # Duration the solenoid valve stays open (milliseconds)
                        # Too short в†’ paddle doesn't extend fully
                        # Too long  в†’ apple not cleared, next apple collision risk

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# AI INFERENCE
# YOLOv8m-seg trained on Gala apples (Fresh / Processing / Cull)
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
inference:
  model_dir: "models/"
  default_model: "best.pt"         # Auto-load on startup
  device: "cuda"                   # "cuda" | "cpu"
  confidence_threshold: 0.50       # Raise to 0.50 to kill low-confidence ghost flickers
  iou_threshold: 0.45              # NMS IoU threshold
  input_mode: "RB-nir1"           # Band combo model was trained on
                                   # Options: RB-nir1 | RG-nir1 | R-nir1-nir2 | RGB | CH1
  class_names:                     # Index order from model - confirmed with training YAML
    - "Fresh"                      # 0  в†ђ matches model output & tracker CLASS_NAMES
    - "Processing"                 # 1
    - "Cull"                       # 2

  # в”Ђв”Ђ Per-speed tracking profiles в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Active profile is selected automatically from conveyor.speed_apples_per_sec.
  # Each profile is fully independent - tune each one separately.
  # Camera: JAI FSFE-3200T  |  Inference: ~21 FPS sustained
  #
  # Frames per apple budget:
  #   1 apple/s  в†’  ~21 frames   (comfortable, more vote data)
  #   2 apples/s в†’  ~10 frames   (tight, needs relaxed thresholds)
  #   3 apples/s в†’  ~7 frames    (very tight, most aggressive settings)
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  tracking_profiles:

    # в”Ђв”Ђ 1 apple / second в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    # CALIBRATED FROM REAL LOG DATA (2026-07-01):
    #   Actual frames_seen per apple: 100-126 (NOT ~30 as budget suggested)
    #   Fresh  : hit_proc~23  (22% of frames)  proc_ratio~0.25
    #   Proc   : hit_proc~39-59 (36-56% of frames) proc_ratio~0.45-0.59
    #   fresh_peak=0.97-0.98 for EVERY apple (Fresh+Proc+Cull) - guard useless
    1:
      enabled: true
      exit_frac: 0.85             # Exit band centre
      band_half_frac: 0.025       # В± 2.5% - original narrow band (fine at slow speed)
      entry_frac: 0.35            # Original - slow apple always enters before 35%
      min_frames: 15              # Original - 15 out of 21 frame budget is comfortable
      max_lost_frames: 10         # Original
      max_recover_dist: 80        # Original - slow apple, small displacement per frame
      min_count_dist_frac: 0.12
      count_memory_frames: 40
      count_merge_frames: 5       # Original
      cull_weight: 1.3            # Boost Cull - model biased toward Fresh/Processing
                                  # cull_weight(1.3) > processing_weight(1.25) so Cull beats
                                  # Processing even when model votes are roughly equal
      processing_weight: 1.6       # KEY: flips borderline 60/40 Proc/Fresh via max(weighted votes)
                                  # Data: Fresh=0.63/Proc=0.37 в†’ stays Fresh (0.63 vs 0.592)
                                  #       Fresh=0.61/Proc=0.39 в†’ flips Proc (0.61 vs 0.624) вњ“
                                  # (was 1.25 - not enough to flip 60/40 borderline cases)
      hit_threshold: 50           # DATA: ~110 frames/apple; 50 = 45% frames high-conf Cull
                                  # (was 16 - calibrated for budget=21, real=110 frames)
      cull_ratio_threshold: 0.58  # 58% weighted Cull votes forces Cull
                                  # (was 0.65 - too hard to reach with model's Fresh bias)
      proc_ratio_threshold: 0.30  # DATA gap: Fresh=0.09-0.19, Processing=0.32-0.39+
                                  # 0.30 catches all Processing (0.32+) without touching Fresh (0.19-)
                                  # (was 0.48 - too high, missed borderline Processing at 0.32-0.39)
      hit_proc_threshold: 999     # DISABLED - even Fresh apples get 35+ Processing hits
                                  # at conf>0.50 in 100+ frames. Use proc_ratio + weight instead.
                                  # (was 33 - fired on every apple including Fresh)
      fresh_peak_protect: 1.0     # DISABLED - ALL apples peak 0.97-0.98 Fresh (model behaviour)
                                  # Guard was always True for every apple including Processing/Cull
      peak_conf_override: 0.55    # Fresh/Processing needs conf>=0.55 to block Cull override
      overwhelming_cull_threshold: 45  # DATA: hit_cull=26-28 at 110 frames = 24% = NOT overwhelming
                                       # 45 hits = 41% of frames = genuinely indisputable
                                       # (was 14 - fired on Processing apples at only 24% Cull frames)

    # в”Ђв”Ђ 2 apples / second в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    # Budget: ~10 frames per apple. Tight window, needs relaxed thresholds.
    # Priority: catch Culls before they exit (fewer chances to observe).
    2:
      enabled: true
      exit_frac: 0.85             # Exit band centre
      band_half_frac: 0.05        # В± 5% - wider for fast apple
      entry_frac: 0.50            # Wider entry zone - fast apples miss the first 35%
      min_frames: 6               # Low gate - 10 frame budget leaves no room for 12+
      max_lost_frames: 20         # Keep lost tracks longer; detector may skip 1-2 frames
      max_recover_dist: 160       # Fast apple moves more pixels between frames
      min_count_dist_frac: 0.12
      count_memory_frames: 40
      count_merge_frames: 12      # Longer merge window prevents double-count on ID switch
      cull_weight: 1.5            # Boost Cull votes - fewer frames means less vote data
      processing_weight: 1.6      # Same model Fresh-bias applies at all speeds
                                  # (was 1.3 - raised to match profile 1 finding: 1.6 needed
                                  #  to flip borderline 60/40 Fresh/Proc via max(weighted votes))
      hit_threshold: 12           # DATA: Cull hit_cull=14-15 at 62-67 frames (22% of frames)
                                  # 12 < 14 в†’ triggers for real Cull. Fresh=1, Proc=0-3 safely below.
                                  # (was 7 - based on budget=10; actual frames=62-67 same as 1 apples/s!)
      cull_ratio_threshold: 0.55  # 55% weighted Cull votes = force Cull
      proc_ratio_threshold: 0.30  # DATA gap: Fresh=0.23, Cull=0.33, Proc=0.65-0.68
                                  # 0.30 sits between Fresh(0.23) and Cull(0.33)
                                  # force_cull takes priority so Cull apples (proc_ratio=0.33-0.42)
                                  # are still correctly called Cull even though proc_ratio>0.30
      hit_proc_threshold: 999     # DISABLED - unreliable at any frame count
      fresh_peak_protect: 1.0     # DISABLED - ALL apples peak 0.97-0.98 Fresh
      peak_conf_override: 0.70    # Needs STRONG Fresh/Processing to block Cull
      overwhelming_cull_threshold: 12  # DATA: hit_cull=14-15 в‰Ґ 12 в†’ overwhelming=True
                                       # overrides clearly_non_cull=True so force_cull fires
                                       # (was 5 - based on budget=10 frames; too low for 62-67 frames)

    # в”Ђв”Ђ 3 apples / second в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    # Budget: ~7 frames per apple. Very aggressive settings.
    # NOTE: Untested - tune after real hardware trials at this speed.
    3:
      enabled: true
      exit_frac: 0.85
      band_half_frac: 0.07        # Even wider exit band for very fast apple
      entry_frac: 0.60            # Apple may not appear until 60% of travel
      min_frames: 4               # Minimum viable observation at 7 frame budget
      max_lost_frames: 25
      max_recover_dist: 220       # Very fast movement per frame
      min_count_dist_frac: 0.12
      count_memory_frames: 40
      count_merge_frames: 15
      cull_weight: 2.0            # Strong boost needed with only 4-7 frames
      processing_weight: 1.5      # Processing also needs boost vs Fresh at this speed
      hit_threshold: 4            # 4 high-conf hits out of 7 = Cull
      cull_ratio_threshold: 0.50  # Even split Cull в†’ force Cull (sparse data)
      peak_conf_override: 0.80    # Very high bar to block Cull at this speed
      overwhelming_cull_threshold: 3   # 3 high-conf hits in 7 = overwhelming


# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# DATA LOGGING
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
logging:
  enabled: false
  output_dir: "data/sessions"
  image_format: "jpg"
  jpeg_quality: 92
  crop_padding_frac: 0.20    # padding around bbox for per-apple detected crops
  save_max_dim: 0            # max px longest side for saved frames (0 = full resolution)
  max_pending_batches: 2     # logging backpressure - drops export frames, not counts
  max_crops_per_batch: 8     # cap encode jobs per frame when belt is full
  heavy_threshold: 12        # above this apple count, log every 2nd frame only
  # Raw save interval and resolution are set in the Data Logging panel (left sidebar).

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# DISPLAY
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
display:
  fps_limit: 60                    # Max GUI refresh rate (sub-sample camera frames)
  image_width: 480                 # Display width per channel panel
  image_height: 360                # Display height per channel panel
  show_bounding_boxes: true
  show_tracking_id: true
  show_grade_label: true

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# APPLE SIZING
# Ridge regression model trained on per-track mask features.
# Only active when a segmentation YOLO model is loaded (has masks).
# Shows "-" in results table when disabled or model missing.
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
sizing:
  enabled: true
  model_path: "models/size_model.pkl"
  min_frames: 4       # Discard tracks shorter than this (too few frames for reliable estimate)

  # Diameter computation angle resolution (background thread - zero FPS impact).
  # Controls max_width() rotation count = 180 / bg_angle_step.
  #
  # Tradeoff:
  #   bg_angle_step=90  в†’  2 rotations  (fastest, ~1.4ms/apple, ~0mm error on circular apples)
  #   bg_angle_step=10  в†’ 18 rotations  (default, ~3.4ms/apple, matches offline quality)
  #   bg_angle_step= 5  в†’ 36 rotations  (exactly offline pipeline, ~7ms/apple)
  #
  # Note: for near-circular apples all three give identical results.
  # Only matters for partially-occluded or non-circular apples.
  # Background thread handles the cost regardless of choice.
  bg_angle_step: 10
