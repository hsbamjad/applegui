# Sweet Potato Grading GUI - Configuration
# Michigan State University | 2026
# ─────────────────────────────────────────────
# Hardware: JAI FSFE-3200T-10GE camera + 2-lane conveyor with divider
#           + 2x pneumatic sorting units controlled via Arduino

# ══════════════════════════════════════════════════════════════
# CAMERA
# ══════════════════════════════════════════════════════════════
camera:
  mode: "mock"           # Options: "mock" | "jai"

  mock:
    fps: 30
    resolution: [2048, 1536]
    replay_folder: null

  # Video simulation mode - set enabled: true and update paths to test
  # without live camera hardware.
  simulation:
    enabled: true
    loop: false        # IMPORTANT: keep false - looping causes re-counting
    fps: 15             # match the fps used when generating the video
    videos:
      ch1: "videos/ch1_s/sweetp_ch1.mp4"
      ch2: "videos/ch2_s/sweetp_ch2.avi"
      ch3: "videos/ch3_s/sweetp_ch3.avi"

  jai:
    ip:          "169.254.101.209"
    mac:         "00:0c:df:0a:f3:f8"
    serial:      "U320500"
    fps:         30
    exposure_us: 9229
    trigger_mode: "Off"
    num_channels: 3

# ══════════════════════════════════════════════════════════════
# SPECTRAL CHANNELS
# ══════════════════════════════════════════════════════════════
channels:
  ch1:
    name: "RGB"
    description: "Full-color RGB band"
    wavelength_nm: 660
    sensor_index: 0
    color: "#60A5FA"

  ch2:
    name: "NIR1"
    description: "Near-infrared band 1"
    wavelength_nm: 800
    sensor_index: 1
    color: "#34D399"

  ch3:
    name: "NIR2"
    description: "Near-infrared band 2"
    wavelength_nm: 900
    sensor_index: 2
    color: "#A78BFA"

# ══════════════════════════════════════════════════════════════
# CONVEYOR
# 2-lane conveyor with divider; sweet potatoes travel left→right
# ══════════════════════════════════════════════════════════════
conveyor:
  lanes: 2
  # Orientation: LR = left→right (sweet potato setup)
  orientation: "LR"
  speed_apples_per_sec: 1
  camera_to_gate_m: 0.0

# ══════════════════════════════════════════════════════════════
# SORTER HARDWARE
# 2 sorting units (one per lane)
# ══════════════════════════════════════════════════════════════
sorter:
  mode: "simulation"    # "simulation" | "serial" (Arduino)

  grade_outlet_map:
    Normal:           "A"    # Good grade -> Outlet A
    Moderate defect:  "B"    # Moderate defect -> Outlet B
    Severe defect:    "C"    # Severe defect -> Outlet C (default)

  serial:
    port: "COM3"
    baudrate: 115200
    timeout_s: 1.0

  valve_pulse_ms: 80

# ══════════════════════════════════════════════════════════════
# AI INFERENCE
# YOLO model trained on sweet potatoes (Normal / Moderate defect / Severe defect)
# ══════════════════════════════════════════════════════════════
inference:
  # Model directory - where .pt files are listed in the GUI dropdown
  model_dir: "S:/MSU_Research/sweetpotatoes/"
  default_model: "yolo26m-seg.pt"
  device: "cuda"                   # "cuda" | "cpu"
  confidence_threshold: 0.45
  iou_threshold: 0.45
  # Input band combo the model was trained on
  # Options: RB-nir1 | RG-nir1 | R-nir1-nir2 | RGB | CH1
  input_mode: "rg-nir1"
  class_names:
    - "Normal"           # 0
    - "Moderate defect"  # 1
    - "Severe defect"    # 2

# ══════════════════════════════════════════════════════════════
# TRACKER
# SweetPotatoTracker - chestnut-style line-crossing gate
# ══════════════════════════════════════════════════════════════
tracker:
  # mode: "sweetp" uses AppleTracker with counting_mode="global" (sequential IDs)
  # mode: "apple"  uses AppleTracker with counting_mode="lane_interleaved" (3-lane GT)
  mode: "sweetp"

  # Counting gate position as fraction of travel axis (LR -> fraction of width)
  exit_frac: 0.70          # count objects when they cross 70% of frame width

  # +/- band around the counting gate (fraction of travel axis)
  band_half_frac: 0.05     # +/- 5% = about 102px on a 2048px frame

  # Entry zone: first detection must be in this zone (fraction) to be eligible
  # Prevents counting objects that appear mid-frame (already past the gate)
  entry_frac: 0.35         # must enter from left 35% of frame

  min_frames: 5            # minimum frames seen before grade is committed
                           # at 3fps: 5 frames = ~1.7s on screen
  max_lost_frames: 10      # frames before a lost track is dropped
  max_recover_dist: 80     # pixels for lost-track recovery
  min_count_dist_frac: 0.06  # min distance between two counts as fraction of axis
  count_memory_frames: 40  # frames the proximity dedup buffer lives
  count_merge_frames: 5    # merge window for same-object dedup

  # Grade decision parameters (same logic as apple, mapped to defect classes)
  defect_weight: 1.5           # vote multiplier for defect classes (cull_weight)
  hit_threshold: 20            # raw high-conf defect hits to force defect grade
  cull_ratio_threshold: 0.58   # vote ratio to force defect grade
  min_vote_conf: 0.20          # ignore votes below this confidence
  min_det_conf: 0.30           # drop YOLO boxes below this confidence
  peak_conf_override: 0.50     # if a non-defect class ever seen >= this, protect from defect
  overwhelming_cull_threshold: 40  # hit_threshold bypass for extremely defective objects

# ══════════════════════════════════════════════════════════════
# DATA LOGGING
# ══════════════════════════════════════════════════════════════
logging:
  enabled: false
  output_dir: "data/sessions_sweetp"
  image_format: "jpg"
  jpeg_quality: 92
  crop_padding_frac: 0.20
  save_max_dim: 0
  max_pending_batches: 2
  max_crops_per_batch: 8
  heavy_threshold: 12

# ══════════════════════════════════════════════════════════════
# SORTER
# Maps model class names → physical outlet letters.
# Keys MUST match the exact class names from best.pt (model.names).
# ══════════════════════════════════════════════════════════════
sorter:
  mode: "simulation"
  grade_outlet_map:
    n: "n"    # Normal          → show 'n'
    m: "m"    # Moderate defect → show 'm'
    s: "s"    # Severe defect   → show 's'

# ══════════════════════════════════════════════════════════════
# DISPLAY
# ══════════════════════════════════════════════════════════════
display:
  fps_limit: 60
  image_width: 480
  image_height: 360
  show_bounding_boxes: true
  show_tracking_id: true
  show_grade_label: true

# ══════════════════════════════════════════════════════════════
# APPLE SIZING - disabled for sweet potatoes
# ══════════════════════════════════════════════════════════════
sizing:
  enabled: false
  model_path: "models/size_model.pkl"
  min_frames: 4
  bg_angle_step: 10
